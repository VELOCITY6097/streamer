<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Stream - External Player Support</title>
    
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    
    <style>
        :root {
            --netflix-red: #e50914;
            --panel-bg: rgba(0, 0, 0, 0.85);
        }

        body {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100vh; width: 100vw;
            overflow: hidden;
            touch-action: none;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        /* --- THEME OVERRIDES --- */
        .video-js { width: 100%; height: 100%; }
        .vjs-play-progress, .vjs-volume-level { background-color: var(--netflix-red) !important; }
        .vjs-control-bar { 
            background-color: var(--panel-bg) !important; 
            height: 70px !important; 
            display: flex !important;
            align-items: center;
        }

        /* External Player Button */
        #external-player-btn {
            position: absolute;
            top: 20px; right: 20px;
            z-index: 100;
            background: orange; /* VLC Orange */
            color: black;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Floating Lock Button */
        #lock-btn {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 100;
            width: 50px; height: 50px;
            background: rgba(0,0,0,0.5);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px;
        }

        #player-wrapper { position: relative; width: 100%; height: 100%; }
        #gesture-layer { position: absolute; inset: 0; z-index: 10; }
        #brightness-overlay { position: absolute; inset: 0; background: black; opacity: 0; pointer-events: none; z-index: 5; }

        .is-locked #lock-btn { border-color: var(--netflix-red); color: var(--netflix-red); }
        .is-locked .vjs-control-bar, .is-locked #external-player-btn { display: none !important; }

        #start-overlay {
            position: fixed; inset: 0; background: #141414;
            z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        #btn-play {
            background: var(--netflix-red); color: white;
            border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: bold; border-radius: 4px;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:var(--netflix-red)">STREAM ENGINE</h1>
        <button id="btn-play">START STREAMING</button>
    </div>

    <div id="player-wrapper">
        <!-- Play in VLC Link -->
        <a href="#" id="external-player-btn">
            <span>Play in VLC</span>
        </a>

        <div id="brightness-overlay"></div>
        <div id="gesture-layer"></div>
        <div id="lock-btn">🔓</div>

        <video id="vjs-player" class="video-js vjs-big-play-centered" playsinline></video>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const infoHash = urlParams.get('hash');

        if (infoHash) {
            // Setup the stream URL
            const streamUrl = `${window.location.origin}/api/stream/${infoHash}?res=source`;
            
            // Setup VLC Deep Link
            // Format: vlc://http://your-ip:3000/api/stream/hash
            const vlcUrl = `vlc://${streamUrl.replace('http://', '').replace('https://', '')}`;
            document.getElementById('external-player-btn').href = vlcUrl;

            // Initialize Web Player
            const player = videojs('vjs-player', {
                controls: true,
                responsive: true,
                playbackRates: [0.5, 1, 1.25, 1.5, 2]
            });
            player.src({ src: streamUrl, type: 'video/mp4' });

            // Start Logic
            document.getElementById('btn-play').addEventListener('click', () => {
                document.getElementById('start-overlay').style.display = 'none';
                player.play();
            });

            // Lock Logic
            let isLocked = false;
            document.getElementById('lock-btn').addEventListener('click', () => {
                isLocked = !isLocked;
                document.body.classList.toggle('is-locked', isLocked);
                document.getElementById('lock-btn').innerText = isLocked ? '🔒' : '🔓';
            });
        }
    </script>
</body>
</html>
